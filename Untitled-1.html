<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vanta Fog Example</title>
  <!-- Load THREE.js (required by Vanta) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <!-- Load Vanta Fog -->
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <style>
    /* Optional: remove default margin/padding */
    body, html {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="vanta-bg" style="width: 100vw; height: 100vh;"></div>

  <script>
    // Wait until DOM is fully loaded
    document.addEventListener("DOMContentLoaded", () => {
      const vantaElement = document.getElementById('vanta-bg');
      if (vantaElement && window.VANTA) {
        VANTA.FOG({
          el: "#vanta-bg",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          highlightColor: 0xff0000,
          midtoneColor: 0x00ff00,
          lowlightColor: 0x0000ff,
          baseColor: 0xffffff,
          blurFactor: 0.5,
          speed: 1.0
        });

        vantaElement.addEventListener('click', () => {
          console.log('Clicked on Vanta background!');
        });
      } else {
        console.error('Element #vanta-bg or VANTA not found!');
      }
    });
  </script>
</body>
</html>
